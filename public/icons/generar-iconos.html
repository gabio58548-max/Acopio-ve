<!DOCTYPE html>
<html>
<head><title>Generador de Íconos — Acopio VE</title></head>
<body>
<h2>Generador de Íconos PWA — Acopio VE</h2>
<p>Haz clic en cada botón para descargar el ícono correspondiente.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:8px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:8px"><br>
<button onclick="descargar(192)">Descargar icon-192.png</button>
<button onclick="descargar(512)">Descargar icon-512.png</button>

<script>
function dibujar(size) {
  const canvas = document.getElementById(`c${size}`);
  const ctx = canvas.getContext('2d');
  const s = size;
  const r = s * 0.188;

  // Fondo redondeado
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0D47A1';
  ctx.fill();

  // Casa
  ctx.beginPath();
  ctx.moveTo(s * .5,  s * .16);
  ctx.lineTo(s * .86, s * .41);
  ctx.lineTo(s * .78, s * .41);
  ctx.lineTo(s * .78, s * .78);
  ctx.lineTo(s * .22, s * .78);
  ctx.lineTo(s * .22, s * .41);
  ctx.lineTo(s * .14, s * .41);
  ctx.closePath();
  ctx.fillStyle = '#FFC107';
  ctx.fill();

  // Cruz
  const cx = s * .5, cy = s * .44;
  const cw = s * .08, ch = s * .23;
  ctx.fillStyle = 'white';
  ctx.fillRect(cx - cw/2, cy - ch/2, cw, ch);
  ctx.fillRect(cx - ch/2, cy - cw/2, ch, cw);

  // Puerta
  ctx.fillStyle = '#0D47A1';
  ctx.fillRect(s * .43, s * .57, s * .14, s * .21);

  return canvas;
}

function descargar(size) {
  const canvas = dibujar(size);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `icon-${size}.png`;
  a.click();
}

dibujar(192);
dibujar(512);
</script>
</body>
</html>
